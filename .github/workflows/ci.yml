name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - '**.md'
      - '**.rst'
      - '**.yml'
      - '**.log'
      - '**.jpg'
      - '**.pdf'
      - '**.png'
      - '**.gif'
      - 'tools/*'
      - 'useless/*'
      - 'docs/*'
      - 'const.py'
      - '.gitignore'
  pull_request:
    branches: [main, dev]

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: pytest -s ./tests

      - name: Test installation from source
        run: python -m pip install .

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pigit/${{ github.ref_name }}
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag is on main branch
        run: |
          git fetch origin main
          if ! git branch -r --contains HEAD | grep -q "origin/main"; then
            echo "Error: This tag is not on the main branch."
            exit 1
          fi

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "from pigit.const import __version__; print(__version__)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
